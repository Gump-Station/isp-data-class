title: "ISP Data Communication & Professionalism"
description: "Student research data products from the UC Berkeley Island Sustainability Program at the Gump South Pacific Research Station, Mo'orea, French Polynesia"
url: "" # will be set to https://<org>.github.io
baseurl: "/isp-data-class" # repo name

# Theme
remote_theme: pages-themes/minimal@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Collections — each year is a folder
collections:
  years:
    output: true
    permalink: /:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: "years"
    values:
      layout: "year"

# Build
markdown: kramdown
exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - CONTRIBUTING.md
