<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  {% seo %}
  <style>
    :root {
      --ocean-deep: #0b3d5b;
      --ocean-mid: #1a6b8a;
      --ocean-light: #e8f4f8;
      --coral: #e07850;
      --sand: #f5f0e8;
      --text-primary: #1e2d3a;
      --text-secondary: #4a6274;
      --border-light: #d4dfe6;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text-primary);
      line-height: 1.7;
      margin: 0;
      padding: 0;
      background: #f8f9fa;
    }
    a { color: var(--ocean-mid); }
    a:hover { color: var(--ocean-deep); }
    h1, h2, h3, h4 {
      font-family: 'Source Serif 4', Georgia, serif;
      color: var(--ocean-deep);
      font-weight: 600;
    }
    h1 { font-size: 1.6rem; margin-top: 0; }
    h2 { font-size: 1.3rem; margin-top: 2rem; }
    h3 { font-size: 1.1rem; }
    hr { border: none; border-top: 2px solid var(--border-light); margin: 2rem 0; }

    .wrapper {
      max-width: 960px;
      margin: 0 auto;
      padding: 0;
      background: #fff;
      min-height: 100vh;
    }

    /* Header */
    .site-header {
      background: linear-gradient(135deg, var(--ocean-deep) 0%, var(--ocean-mid) 100%);
      color: #fff;
      padding: 2.5rem 2.5rem 2rem;
    }
    .site-header h1 { color: #fff; font-size: 1.75rem; margin: 0 0 0.25rem; }
    .site-header h1 a { color: #fff; text-decoration: none; }
    .site-header h1 a:hover { opacity: 0.9; }
    .site-header p { color: rgba(255,255,255,0.85); font-size: 0.95rem; margin: 0; line-height: 1.5; }
    .site-header .location-tag {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      padding: 0.2rem 0.75rem;
      border-radius: 3px;
      font-size: 0.8rem;
      margin-top: 0.75rem;
      letter-spacing: 0.03em;
    }

    main { padding: 2rem 2.5rem; }

    /* Year cards */
    .year-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin: 1.5rem 0;
    }
    .year-card {
      background: #fff;
      border: 1px solid var(--border-light);
      border-radius: 6px;
      padding: 1.5rem;
      text-decoration: none;
      color: var(--text-primary);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .year-card:hover {
      border-color: var(--ocean-mid);
      box-shadow: 0 2px 12px rgba(11,61,91,0.1);
    }
    .year-card h3 { margin: 0 0 0.25rem; font-size: 1.3rem; }
    .year-card .cohort-count { color: var(--text-secondary); font-size: 0.85rem; }

    /* Project cards */
    .project-card {
      background: #fff;
      border: 1px solid var(--border-light);
      border-left: 4px solid var(--ocean-mid);
      border-radius: 0 4px 4px 0;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .project-card h3 { font-size: 1.15rem; margin-top: 0; }
    .project-card .links {
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .project-card .links a,
    .project-card .links span {
      display: inline-block;
      font-size: 0.8rem;
      padding: 0.25rem 0.65rem;
      border-radius: 3px;
      text-decoration: none;
    }
    .project-card .links a {
      background: var(--ocean-light);
      color: var(--ocean-deep);
    }
    .project-card .links a:hover {
      background: var(--ocean-mid);
      color: #fff;
    }
    .project-card .links .lc-notice {
      background: #f0e6d3;
      color: #6b4c1e;
    }

    /* DOI metadata */
    .doi-metadata {
      border: 1px dashed var(--border-light);
      border-radius: 4px;
      padding: 1rem 1.25rem;
      margin: 0.75rem 0;
      background: var(--sand);
      font-size: 0.9rem;
    }
    .doi-metadata .doi-title { font-weight: 600; color: var(--ocean-deep); }
    .doi-metadata .doi-creators { color: var(--text-secondary); font-style: italic; margin: 0.25rem 0; }
    .doi-metadata .doi-abstract { margin-top: 0.5rem; line-height: 1.6; }
    .doi-metadata .doi-loading { color: var(--text-secondary); font-style: italic; }

    /* ORCID profile cards */
    .cohort-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      margin: 1rem 0 2rem;
    }
    .orcid-profile {
      background: #fff;
      border: 1px solid var(--border-light);
      border-radius: 6px;
      padding: 1.25rem;
    }
    .orcid-name {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--ocean-deep);
      margin-bottom: 0.15rem;
    }
    .orcid-affiliation { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.4rem; }
    .orcid-bio { font-size: 0.85rem; line-height: 1.6; margin-bottom: 0.5rem; }
    .orcid-keywords { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 0.5rem; }
    .orcid-keyword {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.15rem 0.55rem;
      background: var(--ocean-light);
      color: var(--ocean-deep);
      border-radius: 3px;
    }
    .orcid-link { font-size: 0.8rem; margin-top: 0.25rem; }
    .orcid-link a { color: var(--ocean-mid); text-decoration: none; }
    .orcid-link a:hover { text-decoration: underline; }

    /* Student list (fallback) */
    .student-list { columns: 2; column-gap: 2rem; list-style: none; padding: 0; }
    .student-list li { padding: 0.3rem 0; break-inside: avoid; font-size: 0.95rem; }

    /* Section dividers */
    .section-divider { border: none; border-top: 2px solid var(--border-light); margin: 2.5rem 0; }

    /* Footer */
    footer {
      padding: 1.5rem 2.5rem;
      border-top: 1px solid var(--border-light);
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    footer a { color: var(--ocean-mid); }

    /* Responsive */
    @media (max-width: 600px) {
      .student-list { columns: 1; }
      .site-header { padding: 1.5rem 1.25rem; }
      main { padding: 1.5rem 1.25rem; }
      footer { padding: 1rem 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <div class="site-header">
      <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      <p>{{ site.description }}</p>
      <span class="location-tag">📍 Gump Station · Mo'orea · French Polynesia</span>
    </div>

    <main>
      {{ content }}
    </main>

    <footer>
      <p>UC Berkeley Island Sustainability Program · ESPM 109E Data Communication &amp; Professionalism<br>
      Hosted on <a href="https://github.com/{{ site.github.owner_name }}/{{ site.github.repository_name }}">GitHub</a></p>
    </footer>
  </div>

  <script src="{{ '/assets/js/doi-fetch.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/orcid-fetch.js' | relative_url }}"></script>
</body>
</html>
