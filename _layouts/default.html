<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo %}
</head>
<body>
  <div class="wrapper" style="max-width: 960px; margin: 0 auto; padding: 20px;">

    <div class="site-header">
      <h1><a href="{{ '/' | relative_url }}" style="color:#fff;text-decoration:none;">{{ site.title }}</a></h1>
      <p>{{ site.description }}</p>
      <span class="location-tag">📍 Gump Station · Mo'orea · French Polynesia</span>
    </div>

    <main>
      {{ content }}
    </main>

    <footer style="margin-top:3rem;padding-top:1.5rem;border-top:1px solid #d4dfe6;font-size:0.8rem;color:#4a6274;">
      <p>UC Berkeley Island Sustainability Program · ESPM 109E Data Communication &amp; Professionalism<br>
      Hosted on <a href="https://github.com/{{ site.github.owner_name }}/{{ site.github.repository_name }}">GitHub</a></p>
    </footer>
  </div>

  <script src="{{ '/assets/js/doi-fetch.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/orcid-fetch.js' | relative_url }}"></script>
</body>
</html>
